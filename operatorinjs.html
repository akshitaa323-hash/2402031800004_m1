<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operators in JavaScript</title>
    <link rel="stylesheet" href="js.css">
</head>
<body>
    <h1>Operators in JavaScript</h1>
    <script>
        var x = 10;
        var y = 5;
        
        // Arithmetic Operators
        var sum = x + y; // Addition
        var difference = x - y; // Subtraction
        var product = x * y; // Multiplication
        var quotient = x / y; // Division
        var remainder = x % y; // Modulus
        
        document.write("Sum: " + sum + "<br>");
        document.write("Difference: " + difference + "<br>");
        document.write("Product: " + product + "<br>");
        document.write("Quotient: " + quotient + "<br>");
        document.write("Remainder: " + remainder + "<br>");
        
        // Comparison Operators
        document.write("Is x equal to y? " + (x == y) + "<br>"); // Equality
        document.write("Is x not equal to y? " + (x != y) + "<br>"); // Inequality
        document.write("Is x greater than y? " + (x > y) + "<br>"); // Greater than
        document.write("Is x less than y? " + (x < y) + "<br>"); // Less than
        
        // Logical Operators
        var a = true;
        var b = false;
        
        document.write("a AND b: " + (a && b) + "<br>"); // Logical AND
        document.write("a OR b: " + (a || b) + "<br>"); // Logical OR
        document.write("NOT a: " + (!a) + "<br>"); // Logical NOT

        // Increment and Decrement Operators
        var d = 5;
        d++;
        document.write("Value of d after increment: " + d + "<br>");
        d--;
        document.write("Value of d after decrement: " + d + "<br>");

        // postfix and prefix increment
        var e = 5;
        document.write("Value of e before increment: " + e + "<br>");
        document.write("Value of e using postfix increment: " + (e++) + "<br>");
        document.write("Value of e after postfix increment: " + e + "<br>");    
        e = 5; // reset e to 5
        document.write("Value of e using prefix increment: " + (++e) + "<br>");
        document.write("Value of e after prefix increment: " + e + "<br>");
    </script>
</body>
</html>
