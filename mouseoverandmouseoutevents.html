<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mouseover and Mouseout events</title>
    <link rel="stylesheet" href="js.css">
</head>
<body> 
    <h2>Mouseover and Mouseout events</h2>
     <img src="https://tse4.mm.bing.net/th/id/OIP.Ja_Tap9PinnT0VgGkUHv_QHaHa?pid=Api&P=0&h=180" alt="" id="bulb"> 
</body>
    <script>
var a = document.getElementById("bulb");
    a.addEventListener("mouseover",()=>{
     a.src= "https://tse3.mm.bing.net/th/id/OIP.zHtYy800GhmmVF2UfkgymwHaJ4?pid=Api&P=0&h=180";
});
    a.addEventListener("mouseout",()=>{
    a.src= "https://tse4.mm.bing.net/th/id/OIP.Ja_Tap9PinnT0VgGkUHv_QHaHa?pid=Api&P=0&h=180";
});
</script>
</html>
