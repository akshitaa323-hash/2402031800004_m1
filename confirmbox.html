<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirm Box</title>
</head>
<body>
    <script>
   var a = confirm("Are you sure?");
   if(a==true) {
    	alert("Record Deleted");
   }   
   else   {
   	alert("Record Not Deleted");
   }
</script>
</body>
</html>
