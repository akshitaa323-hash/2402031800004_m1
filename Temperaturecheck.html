<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temperature check</title>
</head>
<body>
    <h2>Temperature Check</h2>
    <script>
        var temp = prompt("Enter the temperature in Celsius");
        if(temp > 30)
        {
            document.write("It's a hot day.");
        }
        else if(temp > 20)
        {
            document.write("It's a nice day.");
        }
        else if(temp > 10)
        {
            document.write("It's a bit cold.");
        }
        else
        {
            document.write("It's cold.");
        }
    </script>
</body>
</html>
