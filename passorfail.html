<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pass or Fail</title>
</head>
<body>
    <h2>Pass or Fail</h2>
    <script>
        var marks = prompt("Enter your marks");
        if(marks >= 50)
        {
            document.write("You have passed the exam.");
        }
        else
        {
            document.write("You have failed the exam.");
        }
    </script>
</body>
</html>
