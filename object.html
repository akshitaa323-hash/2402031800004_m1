<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creating objects using new object</title>
</head>
<body>
    <script>
        var person = new Object();

        person.firstName = "Akshita";
        person.lastName =  "Agrawal";
        person.sayHi = ()=> {
        alert("Welcome " + person.firstName + "  " + person.lastName)
    }
    person.sayHi();

    </script>

    <script>
     var person = {firstName: "akshita", lastName: "agrawal",
     sayHi : function() 
     {
        alert("Hi! " + person.firstName + " " + person.lastName);
    }
}
    person.sayHi();
    </script>
</body>
</html>
