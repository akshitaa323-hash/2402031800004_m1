<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=<device-width>, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Data Types in JavaScript</h1>
    <script>
        var a=5;
        var b="Hello";
        var c=true;
        var d=null;
        var e=undefined;
        var arr=[1,2,3];
        document.write("The value of a is: " + a + "<br>");
        document.write("The type of a is: " + typeof a + "<br>");
        document.write("The value of b is: " + b + "<br>");
        document.write("The type of b is: " + typeof b + "<br>");
        document.write("The value of c is: " + c + "<br>");
        document.write("The type of c is: " + typeof c + "<br>");
        document.write("The value of d is: " + d + "<br>");
        document.write("The type of d is: " + typeof d + "<br>");
        document.write("The value of e is: " + e + "<br>");
        document.write("The type of e is: " + typeof e + "<br>");
        document.write("The value of arr is: " + arr + "<br>");
        document.write("The type of arr is: " + typeof arr + "<br>");
    </script>
</body>
</html>
