<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set interval function</title>
</head>
<body id="mybody">
    <h2>Background Color Changer</h2>

<script>
    var colors = ["red","green","blue","pink","black","orange","yellow","purple"];
    var mybody = document.getElementById("mybody");
    var i=0;
    setInterval(()=>{
    mybody.style.backgroundColor = colors[i];
    ++i;
    if(i==colors.length)
     {
    i=0;
     }
},100)
</script>
</body>
</html>
