<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Functions</title>
    <link rel="stylesheet" href="js.css">
</head>
<body>
    <h2>Math functions</h2>
    <script>
        document.writeln(Math.E);
        document.write("<br><br>");

        var a = Math.pow(2,3);
        document.writeln(a + "<br><br>");
         
        var num = Math.random();
        document.writeln(num + "<br><br>"); 

        var num2 = parseInt(1 + (Math.random() * 100)); 
        document.writeln(num2 + "<br><br>");  

        document.write(Math.ceil(2.7) + "<br><br>");
        document.write(Math.floor(2.7) + "<br><br>");
        document.write(Math.round(2.7) + "<br><br>");

    </script>   
</body>
</html>
