<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loops</title>
    <link rel="stylesheet" href="js.css">
</head>
<body>
    <h2>For Loop in JavaScript</h2>
    <h3>For Loop</h3>
    <script>
        for(var a= 1; a <= 10; a++)
        {
            document.write(a + "<br>");
        }
    </script>
    <br><br>
    <h2>While Loop</h2>
    <script>
        var b = 10;
        while(b >= 1)
        {
            document.write(b + "<br>");
            b--;
        }
    </script>
    <br><br>
    <h2>Do-While Loop</h2>
    <script>
        var c=2;
        do
        {
            document.write(c + "<br>");
            c+=2;   
        }
        while(c <= 20);            
    </script>

    <br><br>
    <h2>Do-While Loop 1-15 odd numbers</h2>
    <script>
        var d = 1;
        do
        {
            document.write(d + "<br>");
            d+=2;   
        }
        while(d <= 15);
    </script>

    <br><br>
    <h2>Fibonacci Sequence</h2>
    <script>
        var a = 0, b = 1, c;
        document.write(a + "<br>");
        document.write(b + "<br>");
        for(var i = 2; i < 10; i++)
        {
            c = a + b;
            document.write(c + "<br>");
            a = b;
            b = c;
        }
    </script>

    <br><br>
    <h2>Countdown from 10 to 1</h2>
    <script>
        let counting = 10;
        while(counting >= 0)
        {
            document.write(counting + "<br>");
            counting--;
        }
    </script>

    <br><br>
    <h2>Multiplication Table of 5</h2>
    <script>
        for(var i = 1; i <= 10; i++)
        {
            document.write("5 x " + i + " = " + (5 * i) + "<br>");
        }
    </script>

    <br><br>
    <h2>checking password</h2>
    <script>
    let password;
    do{
        password=prompt("enter password");
    } while(password != "1234");

    console.log("password is correct");
    </script>

    <br><br>
    <script>
    let str = prompt("Enter a string");
    let count = 0;

    if (str != null) {
        for (let i = 0; i < str.length; i++) {
            if (str[i] == 'a' || str[i] == 'e' || str[i] == 'i' || 
                str[i] == 'o' || str[i] == 'u' ||
                str[i] == 'A' || str[i] == 'E' || str[i] == 'I' || 
                str[i] == 'O' || str[i] == 'U') {
                count++;
            }
        }

        document.write("Number of vowels in the string: " + count);
    }
</script>
</body>
</html>
