    <title>Arrow Function</title>
</head>
<body>
    <script>
        let sum = (a, b) => 
    { 
        let result = a + b; 
        return result; 
    } 
        let result1 = sum(5,7); 
        console.log(result1); 
    </script>
    <script>
        let welcome = function(name, age){
            return `Hello & welcome ${name} - ${age}`;
        }
        console.log(welcome(" girls", 25));
    </script>
